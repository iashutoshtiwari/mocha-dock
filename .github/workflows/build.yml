name: Build and Package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm cmake extra-cmake-modules python gcc ninja gettext \
          qt6-base qt6-declarative qt6-wayland qt6-5compat \
          plasma-wayland-protocols libplasma plasma-desktop plasma-workspace \
          layer-shell-qt kwayland plasma-activities \
          karchive kcoreaddons kcrash kdbusaddons kglobalaccel kguiaddons \
          ki18n kiconthemes kio knewstuff knotifications kpackage ksvg \
          kwindowsystem kxmlgui kconfig kcmutils \
          wayland-protocols
    - name: Build
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        dnf install -y cmake extra-cmake-modules gcc-c++ ninja-build gettext \
          qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qtwayland-devel qt6-qt5compat-devel \
          libplasma-devel plasma-wayland-protocols plasma-workspace-devel \
          layer-shell-qt-devel kf6-kwayland-devel plasma-activities-devel \
          kf6-karchive-devel kf6-kcoreaddons-devel kf6-kcrash-devel \
          kf6-kdbusaddons-devel kf6-kglobalaccel-devel kf6-kguiaddons-devel \
          kf6-ki18n-devel kf6-kiconthemes-devel kf6-kio-devel \
          kf6-knewstuff-devel kf6-knotifications-devel kf6-kpackage-devel \
          kf6-ksvg-devel kf6-kwindowsystem-devel kf6-kxmlgui-devel \
          kf6-kconfig-devel kf6-kcmutils-devel
    - name: Build
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build
